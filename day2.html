<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Assignment</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
    }

    table {
        border-collapse: collapse;
        margin: 50px auto;
        width: 80%;
        background: #fff;
    }

    th, td {
        border: 1px solid #000;
        padding: 10px;
        text-align: center;
    }

    th {
        background-color: #ddd;
        font-weight: bold;
    }

    .left {
        text-align: left;
    }
</style>
</head>
<body>

<table>
    <tr>
        <th rowspan="2">No</th>
        <th rowspan="2">Student Name</th>
        <th rowspan="2">Gender</th>
        <th rowspan="2">Roll No.</th>
        <th colspan="3">Marks</th>
    </tr>
    <tr>
        <th>Myanmar</th>
        <th>English</th>
        <th>Maths</th>
    </tr>

    <tr>
        <td>1</td>
        <td class="left">Su Su</td>
        <td rowspan="2">Female</td>
        <td>5CS-32</td>
        <td>60</td>
        <td>75</td>
        <td>86</td>
    </tr>

    <tr>
        <td>2</td>
        <td class="left">Moe Moe</td>
        <td>5CS-33</td>
        <td>78</td>
        <td>86</td>
        <td>84</td>
    </tr>

    <tr>
        <td>3</td>
        <td class="left">Kyaw Kyaw</td>
        <td rowspan="3">Male</td>
        <td>5CS-34</td>
        <td>89</td>
        <td>43</td>
        <td>86</td>
    </tr>

    <tr>
        <td>4</td>
        <td class="left">Mg Mg</td>
        <td>5CS-35</td>
        <td>76</td>
        <td>75</td>
        <td>75</td>
    </tr>

    <tr>
        <td>5</td>
        <td class="left">Aung Aung</td>
        <td>5CS-36</td>
        <td>87</td>
        <td>75</td>
        <td>86</td>
    </tr>
</table>

</body>
</html>
