<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
    width: 100%;
    height: 100vh;
    background:#d1f8cd;
    display:flex;
    align-items: center;
    justify-content: center;

}
.calculator{
    background:#0cb149fd ;;
    padding: 10px 20px;
    border-radius: 10px;  
}
.calculator form input{
    border: 0;
    outline: 0;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    box-shadow: -8px -8px 15px rgb(42, 53, 57),5px 5px 15px #030e09;
background: transparent;
font-size: 20px;
color:#0e1e14;
cursor:pointer;
margin:10px;
}
form .display{
    display: flex;
    justify-content: flex-end;
    margin: 0px 0;
}
form .display input{
    text-align: right;
    flex:1;
    font-size: 45px ;
    box-shadow: none;
}
form input.equal{
    width: 125px;;
}
form input.operator
{
    color:#130213;
}

</style>
<body>
    <div class="container">
        <div class="calculator">
    <form><div class="display">
    
        <input type="text" name="display">
        </div>
        <div>
            <input type="button" value="AC" onclick="display.value=''" class="operator">
            <input type="button" value="⌫" onclick="display.value=display.value.toString().slice(0,-1)" class="operator">
            <input type="button" value="." onclick="display.value+='.'">
            <input type="button" value="/" onclick="display.value+='/'">
           </div>
           <div>
            <input type="button" value="7" onclick="display.value+='7'">
            <input type="button" value="8" onclick="display.value+='8'">
            <input type="button" value="9" onclick="display.value+='9'">
            <input type="button" value="*" onclick="display.value+='*'">
           </div>
           <div>
            <input type="button" value="4" onclick="display.value+='4'">
            <input type="button" value="5" onclick="display.value+='5'">
            <input type="button" value="6" onclick="display.value+='6'">
            <input type="button" value="-" onclick="display.value+='-'">
           </div>
           <div>
            <input type="button" value="1" onclick="display.value+='1'">
            <input type="button" value="2" onclick="display.value+='2'">
            <input type="button" value="3" onclick="display.value+='3'">
            <input type="button" value="+" onclick="display.value+='+'">
           </div>
           <div>
            <input type="button" value="%" onclick="display.value=eval(display.value)/100">
            <input type="button" value="0" onclick="display.value+='0'">
            <input type="button" value="(" onclick="display.value+='('">
            <input type="button" value=")" onclick="display.value+=')'">
            <div>
            <input type="button" value="=" onclick="display.value=eval(display.value)" class="equal">
            </div>
           </div>
           
   
</form>
</div>
</div>
</body>
</html>
